<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <meta name="description" content="Roleta virtual interativa para sorteio de prêmios em eventos e totens.">
    <title>Roleta Virtual — Sorteio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="roulette">

    <div id="view-roulette" class="view active">

        <!-- Background dinâmico -->
        <div class="roulette-bg" id="roulette-bg" aria-hidden="true"></div>
        <!-- Overlay sutil para legibilidade -->
        <div class="roulette-overlay" aria-hidden="true"></div>

        <!-- Navegação -->
        <nav class="roulette-nav" aria-label="Navegação da roleta">
            <button class="btn btn-nav" id="btn-to-config" aria-label="Voltar para configurações">
                ⚙️ Configurações
            </button>
            <button class="btn btn-nav" id="btn-to-stats" aria-label="Ver estatísticas">
                📊 Estatísticas
            </button>
        </nav>

        <!-- Logo -->
        <div class="roulette-logo-area" id="roulette-logo-area">
            <img id="roulette-logo" src="" alt="Logo do contratante" class="hidden">
        </div>

        <!-- Roleta -->
        <div class="roulette-wheel-wrapper">
            <div class="pointer-wrap" aria-hidden="true">
                <div class="pointer-triangle"></div>
            </div>
            <div class="canvas-glow-ring" aria-hidden="true"></div>
            <canvas id="roulette-canvas" class="roulette-canvas" aria-label="Roleta de prêmios"></canvas>
        </div>

        <!-- Botão Girar -->
        <div class="roulette-actions">
            <button class="btn-spin" id="btn-spin" aria-label="Girar a roleta">
                <span class="spin-icon" aria-hidden="true">🎰</span>
                <span class="spin-text">GIRAR!</span>
            </button>
        </div>

        <!-- Último Prêmio Sorteado -->
        <div class="last-prize-display" id="last-prize-display" aria-live="polite">
            <span class="last-prize-label">Último prêmio:</span>
            <span class="last-prize-name" id="last-prize-name">—</span>
        </div>

    </div>

    <!-- Modal: Resultado do Sorteio -->
    <div id="modal-result" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-card">
            <canvas id="confetti-canvas" class="confetti-canvas" aria-hidden="true"></canvas>
            <div class="modal-emoji" aria-hidden="true">🎉</div>
            <h2 class="modal-title" id="modal-title">Parabéns!</h2>
            <p class="modal-subtitle">O prêmio sorteado foi:</p>
            <div class="modal-prize-name" id="modal-prize-name" aria-live="assertive">—</div>
            <button class="btn btn-primary btn-modal-close" id="btn-modal-close" aria-label="Fechar resultado e continuar">
                ✓ Continuar
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
